            "@type": "Answer",

          "@type": "Question",
          "name": "Does ChatParser work offline?",

            "@type": "Answer",
            "text": "Yes! Once the app is loaded, you can disconnect from the internet. All chat parsing and media rendering happen locally on your computer. Your privacy is guaranteed."

        },

          "@type": "Question",

        }
